# NOTE: This workflow runs ONLY on the nlopez fork.
# Upstream workflows (boredazfcuk/docker-icloudpd) are completely isolated
# and CANNOT be triggered by pushes to this fork.
name: Build and Push Docker Image

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read build version
        id: version
        run: |
          BUILD_VERSION=$(cat build_version.txt | tr -d '[:space:]')
          echo "version_tag=1.0.${BUILD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: icloudpd.dockerfile
          platforms: linux/386,linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          tags: |
            ghcr.io/nlopez/icloudpd:latest
            ghcr.io/nlopez/icloudpd:${{ steps.version.outputs.version_tag }}
          cache-from: type=registry,ref=ghcr.io/nlopez/icloudpd:buildcache
          cache-to: type=registry,ref=ghcr.io/nlopez/icloudpd:buildcache,mode=max